<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Golf Score</title>
  <meta name="theme-color" content="#2f6b3f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Golf Score" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --primary: #2f6b3f;
      --primary-dark: #1e4d2b;
      --primary-soft: #dfeedd;
      --accent: #c6a15b;
      --sand: #f3eee2;
      --bg: #eef4ec;
      --card: #ffffff;
      --border: #d6e2d3;
      --birdie: #c33232;
      --bogey: #2f2f2f;
      --muted: #7c8879;
      --warn: #a72828;
      --text: #18311f;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #f4f8f2 0%, var(--bg) 100%);
      margin: 0;
      padding-bottom: 34px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: .01em;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .tab-nav {
      display: flex;
      background: rgba(255,255,255,.96);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(47,107,63,.08);
      box-shadow: 0 4px 18px rgba(18,45,26,.08);
    }
    .tab-btn {
      flex: 1;
      padding: 18px 8px;
      border: none;
      background: none;
      font-size: 1.08rem;
      font-weight: 900;
      color: #6f7a6f;
      border-bottom: 4px solid transparent;
      cursor: pointer;
      transition: .18s ease;
    }
    .tab-btn.active { color: var(--primary-dark); border-bottom: 4px solid var(--primary); background: linear-gradient(180deg, rgba(47,107,63,.03), rgba(47,107,63,.01)); }
    .content { padding: 12px; display: none; max-width: 1380px; margin: 0 auto; }
    .content.active { display: block; }
    .card {
      background: var(--card);
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(31,66,40,.06);
      margin-bottom: 14px;
    }
    h2 {
      color: var(--primary-dark);
      font-size: 1.14rem;
      border-left: 5px solid var(--accent);
      padding-left: 10px;
      margin: 0 0 12px;
      font-weight: 900;
      line-height: 1.25;
    }
    .small-note { font-size: .86rem; color: #61705f; line-height: 1.45; }
    .warning-box {
      display: none;
      background: #fff4e5;
      border: 2px solid #ffcc80;
      color: #8a4b00;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }
    .danger-box {
      display: none;
      background: #ffebee;
      border: 2px solid #ef9a9a;
      color: var(--warn);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }
    label small { display: block; margin-bottom: 5px; color: #5f6d5d; font-size: .82rem; }
    input, select {
      width: 100%;
      padding: 13px 12px;
      border: 2px solid #d2ddd0;
      border-radius: 12px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 900;
      background: #fff;
      color: var(--text);
      min-height: 50px;
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47,107,63,.09);
    }
    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 8px;
      pointer-events: none;
    }
    .check-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .check-item {
      background: #fff;
      border: 2px solid #cfdbcf;
      padding: 14px 8px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      min-height: 52px;
    }
    .check-item.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary-dark); }
    .check-item.disabled { background: #f1f3f0; border-color: #e1e6df; color: #adb6ab; cursor: not-allowed; }
    .mode-stack { display: grid; gap: 8px; }
    .mode-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 2px solid #cfdbcf;
      border-radius: 14px;
      padding: 13px 14px;
      cursor: pointer;
      user-select: none;
      min-height: 54px;
      background: #fff;
    }
    .mode-row.active { background: linear-gradient(180deg, #edf7ee, #e5f2e6); border-color: var(--primary); color: var(--primary-dark); }
    .mode-row.disabled { background: #f1f3f0; border-color: #e1e6df; color: #a5afa2; cursor: not-allowed; }
    .mode-child { margin-left: 18px; }
    .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 0 14px; }
    .name-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 12px; box-shadow: 0 6px 16px rgba(31,66,40,.04); }
    .name-card label { display:block; margin-bottom: 6px; }
    .table-wrapper { overflow-x: auto; background: white; border-radius: 16px; border: 1px solid var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,.8); }
    .scoreboard-vertical { --sticky-top: 58px; --info-col-w: 64px; --player-col-w: 76px; }
    .scoreboard-vertical.table-wrapper { position: relative; overflow: auto; max-height: calc(100vh - 220px); -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    .scoreboard-vertical table { min-width: calc(var(--info-col-w) * 3 + var(--player-col-w) * 2); width: max-content; table-layout: fixed; border-collapse: separate; border-spacing: 0; }
    .scoreboard-vertical thead tr:not(#rowH) { display: none; }
    .scoreboard-vertical .sticky-col { width: var(--info-col-w); min-width: var(--info-col-w); max-width: var(--info-col-w); }
    .scoreboard-vertical .sticky-hole,
    .scoreboard-vertical .sticky-par,
    .scoreboard-vertical .sticky-hdcp { position: -webkit-sticky; position: sticky; min-width: var(--info-col-w); max-width: var(--info-col-w); }
    .scoreboard-vertical .sticky-hole { left: 0; z-index: 64; background: #f8fbf7; }
    .scoreboard-vertical .sticky-par { left: var(--info-col-w); z-index: 63; background: #fff; }
    .scoreboard-vertical .sticky-hdcp { left: calc(var(--info-col-w) * 2); z-index: 62; background: #fff; }
    .scoreboard-vertical thead th { position: -webkit-sticky; position: sticky; top: 0; z-index: 70; background: #f8fbf7; box-shadow: 0 1px 0 #dbe5d8; }
    .scoreboard-vertical thead th.player-head { background:#f8fbf7; }
    .scoreboard-vertical thead .sticky-hole { z-index: 86; }
    .scoreboard-vertical thead .sticky-par { z-index: 85; }
    .scoreboard-vertical thead .sticky-hdcp { z-index: 84; }
    .scoreboard-vertical thead th.player-head,
    .scoreboard-vertical td.player-col,
    .scoreboard-vertical .summary-row td.player-col { width: var(--player-col-w); min-width: var(--player-col-w); max-width: var(--player-col-w); }
    .scoreboard-vertical thead th.player-head { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .scoreboard-vertical td.sticky-par,
    .scoreboard-vertical td.sticky-hdcp { padding: 3px; }
    .scoreboard-vertical td.sticky-par input,
    .scoreboard-vertical td.sticky-hdcp input { min-height: 42px; height: 42px; padding: 0 2px; font-size: 1.02rem; border-radius: 10px; }
    .scoreboard-vertical .summary-row th, .scoreboard-vertical .summary-row td { background:#f6faf5; color:var(--primary-dark); }
    table { border-collapse: collapse; text-align: center; width: 100%; min-width: 1900px; table-layout: fixed; }
    th, td {
      border: 1px solid #e4ebe2;
      padding: 4px;
      height: 68px;
      position: relative;
      font-weight: 900;
      font-size: 1.04rem;
      background: #fff;
      color: var(--text);
    }
    .sticky-col {
      position: sticky;
      left: 0;
      background: #f8fbf7;
      z-index: 60;
      width: 108px;
      border-right: 2px solid #dbe5d8;
    }
    .score-cell input { border: none !important; background: transparent !important; width: 100%; height: 100%; font-size: 1.58rem; padding: 0; }
    .mark-circle {
      border: 3px solid var(--birdie);
      border-radius: 50%; width: 48px; height: 48px;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .mark-double-circle {
      border: 6px double var(--birdie);
      border-radius: 50%; width: 52px; height: 52px;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .mark-square {
      border: 3px solid var(--bogey);
      width: 48px; height: 48px;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .mark-double-square {
      border: 6px double var(--bogey);
      width: 52px; height: 52px;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }
    .res-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #edf1ec;
      font-size: 1.02rem;
    }
    .red-text { color: #c33232; }
    .green-text { color: var(--primary-dark); }
    .muted { color: #7a8678; }
    .final-area {
      background: linear-gradient(180deg, #2f6b3f 0%, #285937 100%);
      color: white;
      padding: 16px;
      border-radius: 18px;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 14px 28px rgba(24,49,31,.16);
    }
    .res-table { min-width: 100% !important; table-layout: auto !important; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .res-table th, .res-table td { height: auto; padding: 9px 8px; font-size: .98rem; }
    .res-table th { background: #f3f7f1; color: var(--primary-dark); }
    .pair-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .player-pair-card { border: 2px solid var(--border); border-radius: 14px; padding: 14px; }
    .player-pair-title { font-size: 1.02rem; color: var(--primary-dark); margin-bottom: 10px; }
    .pair-row {
      display: grid;
      grid-template-columns: auto 1fr 96px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #e2e9e0;
    }
    .pair-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .pair-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 2px solid #cfd9cd;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      background: #fff;
    }
    .pair-toggle.active { background: var(--primary-soft); border-color: var(--primary); }
    .pair-toggle.disabled { background: #f1f3f0; border-color: #e1e6df; cursor: not-allowed; }
    .pair-name { text-align: left; font-size: .98rem; }
    .pair-score-input { padding: 10px 8px; font-size: .98rem; min-height: 44px; }
    .pair-score-input:disabled { background: #f4f5f3; color: #aaa; }
    .rank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .action-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 0; }
    button.action-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: .98rem;
      font-weight: 900;
      cursor: pointer;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 6px 18px rgba(47,107,63,.16);
    }
    button.action-btn.secondary { background: #607d8b; }
    button.action-btn.danger { background: #c62828; }
    .hole-win-log { display: grid; gap: 6px; }
    .hole-win-item {
      background: #f6faf5;
      border: 1px solid #dde7db;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .96rem;
      color: var(--text);
    }
    .summary-table { width: 100%; min-width: unset; table-layout: auto; border-collapse: separate; border-spacing: 0; }
    .summary-table th, .summary-table td { height: auto; padding: 10px 8px; font-size: .96rem; }
    .summary-table th { background: var(--primary); color: #fff; border-bottom: 1px solid var(--primary-dark); }
    .summary-table td { background: rgba(255,255,255,.96); color: var(--text); border-bottom: 1px solid #e5eee2; }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table td:first-child, .summary-table th:first-child { border-top-left-radius: 12px; }
    .summary-table td:last-child, .summary-table th:last-child { border-top-right-radius: 12px; }
    .center-note { text-align: center; color: #72806f; padding: 8px 0 2px; font-size: .95rem; }
    .result-grid { display: grid; grid-template-columns: 1.12fr .88fr; gap: 12px; }
    .result-stack { display: grid; gap: 12px; }
    #result .card { overflow: hidden; }

    .collapse-block { border: 1px solid #dde7db; border-radius: 14px; overflow: hidden; background: #fff; margin-top: 10px; }
    .collapse-head {
      width: 100%; border: none; background: #f4f8f3; color: var(--primary-dark);
      font-size: .98rem; font-weight: 900; padding: 13px 14px; text-align: left; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
    }
    .collapse-head::after { content: '＋'; font-size: 1.1rem; }
    .collapse-block.open .collapse-head::after { content: '－'; }
    .collapse-body { display: none; padding: 10px; border-top: 1px solid #e3ece1; background: #fff; }
    .collapse-block.open .collapse-body { display: block; }
    .section-summary {
      background: #eef5ec; border: 1px solid #dbe7d8; border-radius: 12px; padding: 10px 12px;
      font-size: .93rem; color: var(--text); margin-bottom: 8px; line-height: 1.5;
    }
    .export-wrap { margin-bottom: 10px; display: flex; justify-content: flex-end; }
    .jpg-capture { background: #fff; border-radius: 18px; }

    .vegas-rank-btn {
      width: 100%;
      padding: 13px 44px 13px 12px;
      border: 2px solid #d2ddd0;
      border-radius: 12px;
      text-align: left;
      font-size: 1.05rem;
      font-weight: 900;
      background: #fff;
      color: var(--text);
      min-height: 50px;
      position: relative;
      cursor: pointer;
    }
    .vegas-rank-btn::after {
      content: '⌄';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-52%);
      font-size: 1.35rem;
      color: var(--text);
      line-height: 1;
      pointer-events: none;
    }
    .vegas-rank-btn:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47,107,63,.09);
    }
    .rank-picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.28);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 18px;
    }
    .rank-picker-overlay.show { display: flex; }
    .rank-picker-sheet {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,.22);
    }
    .rank-picker-title {
      padding: 16px 18px;
      font-size: 1.08rem;
      font-weight: 900;
      color: var(--primary-dark);
      border-bottom: 1px solid #e6ece4;
      text-align: center;
    }
    .rank-picker-option {
      width: 100%;
      border: none;
      background: #fff;
      padding: 18px 20px;
      text-align: left;
      font-size: 1.08rem;
      font-weight: 900;
      color: var(--text);
      border-bottom: 1px solid #edf1ec;
      cursor: pointer;
    }
    .rank-picker-option:last-child { border-bottom: none; }


    .player-extra.hidden { display: none; }
    .matrix-table { min-width: 100% !important; table-layout: auto !important; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .matrix-table th, .matrix-table td { height: auto; padding: 9px 10px; font-size: .96rem; }
    .matrix-table th { background: #f3f7f1; color: var(--primary-dark); }
    .matrix-table td.total-col, .matrix-table th.total-col { background: #eef5ec; }
    .matrix-note { margin-top: 8px; font-size: .88rem; color: #667561; }
    .capture-section { margin-top: 14px; }
    .capture-section .capture-title { font-size: 1.02rem; font-weight: 900; margin: 0 0 8px; color: #fff; }
    .capture-section .capture-card { background: rgba(255,255,255,.96); border-radius: 14px; padding: 10px; }
    .export-preview-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; z-index: 4000;
      align-items: center; justify-content: center; padding: 18px;
    }
    .export-preview-overlay.show { display: flex; }
    .export-preview-sheet {
      width: min(720px, 100%); max-height: 92vh; background: #fff; border-radius: 18px; overflow: hidden;
      box-shadow: 0 24px 48px rgba(0,0,0,.24);
    }
    .export-preview-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid #e5ece3; font-size: .96rem; color: var(--primary-dark);
    }
    .export-preview-close {
      border: none; background: #eef5ec; color: var(--primary-dark); width: 38px; height: 38px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 900;
    }
    .export-preview-body { padding: 14px; overflow: auto; max-height: calc(92vh - 68px); background: #f4f8f2; }
    .export-preview-body img { width: 100%; height: auto; display: block; border-radius: 12px; }

    @media (max-width: 1024px) {
      .result-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 860px) {
      .grid-3, .grid-4, .grid-2, .rank-grid, .result-grid, .name-grid { grid-template-columns: 1fr; }
      .pair-row { grid-template-columns: 42px 1fr 88px; }
      .tab-btn { font-size: .95rem; padding: 15px 6px; }
      .content { padding: 10px; }
      .card { padding: 13px; border-radius: 16px; margin-bottom: 10px; }
      h2 { font-size: 1.02rem; margin-bottom: 10px; }
      .small-note { font-size: .8rem; }
      input, select { min-height: 46px; font-size: 1rem; padding: 11px 10px; }
      .mode-row, .check-item { min-height: 48px; padding: 11px 12px; }
      .res-row { font-size: .96rem; padding: 8px 0; }
      .hole-win-item { padding: 8px 10px; font-size: .92rem; }
      .summary-table th, .summary-table td { font-size: .86rem; padding: 8px 6px; }

      .scoreboard-vertical { --sticky-top: 56px; --info-col-w: 48px; --player-col-w: 62px; max-height: calc(100vh - 170px); }
      .scoreboard-vertical table { min-width: calc(var(--info-col-w) * 3 + var(--player-col-w) * 2); }
      .scoreboard-vertical th, .scoreboard-vertical td { height: 52px; padding: 2px; font-size: .84rem; }
      .scoreboard-vertical td.sticky-par,
      .scoreboard-vertical td.sticky-hdcp { padding: 2px; }
      .scoreboard-vertical td.sticky-par input,
      .scoreboard-vertical td.sticky-hdcp input { min-height: 34px; height: 34px; padding: 0 1px; font-size: .92rem; border-radius: 8px; }
      .scoreboard-vertical .score-cell input { font-size: 1.02rem; }
      .scoreboard-vertical .mark-circle, .scoreboard-vertical .mark-square { width: 28px; height: 28px; border-width: 2px; }
      .scoreboard-vertical .mark-double-circle, .scoreboard-vertical .mark-double-square { width: 32px; height: 32px; border-width: 4px; }
      .scoreboard-vertical thead th { font-size: .76rem; }
      .scoreboard-vertical .summary-row th, .scoreboard-vertical .summary-row td { font-size: .76rem; }
      .scoreboard-vertical thead th.player-head,
      .scoreboard-vertical td.player-col,
      .scoreboard-vertical .summary-row td.player-col { width: var(--player-col-w); min-width: var(--player-col-w); max-width: var(--player-col-w); }
    }
  </style>
</head>
<body>
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-set" onclick="openTab('setting')">⚙️ 設定</button>
    <button class="tab-btn" id="tab-score" onclick="openTab('scoring')">⛳ 計分</button>
    <button class="tab-btn" id="tab-res" onclick="calculateFinal()">📊 結算</button>
  </div>

  <div id="setting" class="content active">
    <div id="global-warning" class="warning-box"></div>
    <div class="card">
      <h2>1. 球場與今日比賽模式</h2>
      <div class="grid-3" style="margin-bottom:12px;">
        <div>
          <label><small>球場名稱</small></label>
          <input type="text" id="courseName" placeholder="請輸入球場名稱">
        </div>
        <div>
          <label><small>已儲存球場</small></label>
          <select id="savedCourseSelect" onchange="handleSavedCourseSelect()"></select>
        </div>
        <div>
          <label><small>起始洞</small></label>
          <input type="number" id="startHole" value="1" min="1" max="18" oninput="renderScoreboard()">
        </div>
      </div>
      <div class="grid-3" style="margin-bottom:12px;">
        <div>
          <label><small>點 / 元</small></label>
          <input type="number" id="pointVal" value="100">
        </div>
        <div></div>
        <div></div>
      </div>
      <div class="grid-4" style="margin-bottom:18px;">
        <div><label><small>Birdie 倍率</small></label><input type="number" id="mB" value="2"></div>
        <div><label><small>4 Par Eagle 倍率</small></label><input type="number" id="mE4" value="5"></div>
        <div><label><small>5 Par Eagle 倍率</small></label><input type="number" id="mE5" value="3"></div>
        <div><label><small>HIO 倍率</small></label><input type="number" id="mHIO" value="10"></div>
      </div>

          <input type="checkbox" id="modeVegas" checked>

        <button type="button" class="export-preview-close" onclick="closeExportPreview()">✕</button>

  <div class="rank-picker-overlay" id="rankPickerOverlay" onclick="closeVegasRankPicker(event)">
    <div class="rank-picker-sheet" onclick="event.stopPropagation()">
      <div class="rank-picker-title" id="rankPickerTitle">請選擇排名</div>
      <div id="rankPickerOptions"></div>
    </div>

  <script>
    const playerIDs = [0,1,2,3];
    const placeholders = ['玩家1','玩家2','玩家3','玩家4'];
    const pairKeys = ['0_1','0_2','0_3','1_2','1_3','2_3'];
    let selectedAllOnce = false;

    function openTab(t){
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(t).classList.add('active');
      document.getElementById('tab-' + (t==='setting'?'set':t==='scoring'?'score':'res')).classList.add('active');
      if (t === 'scoring') {
          refreshSavedCourseSelect();
          setTimeout(applyScoreboardStickyTop, 0);
      }
    }

    function nameOf(i){
      return (document.getElementById('name'+i)?.value || '').trim() || placeholders[i];
    }


    function applyScoreboardStickyTop(){
      const wrapper = document.querySelector('.scoreboard-vertical');
      if (!wrapper) return;
      const nav = document.querySelector('.tab-nav');
      const navHeight = nav ? Math.ceil(nav.getBoundingClientRect().height) : 56;
      wrapper.style.setProperty('--sticky-top', `${Math.max(52, navHeight)}px`);
    }

    function getActivePlayers(){
      const active = [];
      for (const i of playerIDs) {
        const name = (document.getElementById('name'+i)?.value || '').trim();
        if (!name) break;
        active.push(i);
      }
      return active;
    }

    function isPlayerActive(playerId){
      return getActivePlayers().includes(playerId);
    }

    function getActiveNames(){
      const names = {};
      getActivePlayers().forEach(i => { names[i] = nameOf(i); });
      return names;
    }

    function applyNumericKeyboardHints(root=document){
      if (!root) return;
      root.querySelectorAll('input[type="number"]').forEach(el => {
        const id = el.id || '';
        const cls = el.className || '';
        if (cls.includes('pair-score-input') || id.startsWith('pair-strokes-')) {
          el.setAttribute('inputmode', 'decimal');
          el.setAttribute('enterkeyhint', 'done');
          return;
        }
        el.setAttribute('inputmode', 'numeric');
        el.setAttribute('pattern', '[0-9]*');
        el.setAttribute('enterkeyhint', 'done');
      });
    }

    function attachSelectAllBehavior(root=document){
      const inputs = root.querySelectorAll('input:not([type="checkbox"]), textarea');
      inputs.forEach(el => {
        if (el.dataset.selectReady === '1') return;
        el.dataset.selectReady = '1';
        const selectAll = () => { try { el.select(); } catch(e) {} };
        el.addEventListener('focus', selectAll);
        el.addEventListener('click', selectAll);
        el.addEventListener('mouseup', e => e.preventDefault());
      });
    }

    function normalizeCourseName(name){
      return (name || '').replace(/\s+/g,' ').trim().toLowerCase();
    }

    function getPlayOrder(){
      let start = parseInt(document.getElementById('startHole').value) || 1;
      if (start < 1 || start > 18) start = 1;
      const arr = [];
      for (let i=0;i<18;i++) arr.push(((start - 1 + i) % 18) + 1);
      return arr;
    }

    function isMatchEnabled(){ return document.getElementById('modeMatch').checked; }
    function isParEnabled(){ return document.getElementById('modePar').checked; }
    function isVegasEnabled(){ return document.getElementById('modeVegas').checked; }
    function isExtEnabled(){ return document.getElementById('extMode').checked; }

    function toggleMainMode(id){
      const cb = document.getElementById(id);
      if (!cb || cb.disabled) return;
      if (id === 'extMode' && !isVegasEnabled()) return;
      cb.checked = !cb.checked;
      applyModeStates(id);
    }

    function setPlayerSmallBoxState(playerId, suffix){
      const cb = document.getElementById(`p${playerId}_${suffix}`);
      const box = document.getElementById(`box_p${playerId}_${suffix}`);
      if (!cb || !box) return;
      const activePlayers = getActivePlayers();
      const playerEnabled = activePlayers.includes(playerId);
      const parentEnabled = suffix === 'm' ? isMatchEnabled() : isParEnabled();
      box.classList.toggle('active', playerEnabled && parentEnabled && cb.checked);
      box.classList.toggle('disabled', !playerEnabled || !parentEnabled);
    }

    function setPlayerMatchSelected(playerId, checked){
      const cb = document.getElementById(`p${playerId}_m`);
      if (!cb) return;
      cb.checked = checked;
      setPlayerSmallBoxState(playerId, 'm');
    }

    function setPlayerParSelected(playerId, checked){
      const cb = document.getElementById(`p${playerId}_p`);
      if (!cb) return;
      cb.checked = checked;
      setPlayerSmallBoxState(playerId, 'p');
    }

    function normalizeMatchPairStates(){
      pairKeys.forEach(key => {
        const [a,b] = key.split('_').map(Number);
        const activePlayers = getActivePlayers();
        const aOn = activePlayers.includes(a) && !!document.getElementById(`p${a}_m`)?.checked;
        const bOn = activePlayers.includes(b) && !!document.getElementById(`p${b}_m`)?.checked;
        const shouldEnable = isMatchEnabled() && aOn && bOn;
        if (shouldEnable) {
          const current = document.getElementById(`pair-strokes-${a}-${b}`)?.value;
          const value = current === '' || current === undefined ? 0 : current;
          setPairState(a,b,true,value);
        } else {
          setPairState(a,b,false,'');
        }
      });
      refreshAllPairDisabledState();
    }

    function resetAllMatchDefaults(){
      getActivePlayers().forEach(i => setPlayerMatchSelected(i, true));
      pairKeys.forEach(key => {
        const [a,b] = key.split('_').map(Number);
        setPairState(a,b,true,0);
      });
      refreshAllPairDisabledState();
    }

    function resetAllParDefaults(){
      getActivePlayers().forEach(i => {
        const cb = document.getElementById(`p${i}_p`);
        if (!cb) return;
        cb.checked = true;
        setPlayerSmallBoxState(i, 'p');
      });
    }

    function applyPlayerConfigVisibility(){
      const activePlayers = getActivePlayers();
      const activeCount = activePlayers.length;
      playerIDs.forEach(i => {
        const extra = document.getElementById(`player-extra-${i}`);
        if (extra) extra.classList.toggle('hidden', i >= activeCount);
        playerIDs.forEach(j => {
          if (i === j) return;
          const row = document.getElementById(`pair-row-${i}-${j}`);
          if (row) row.style.display = activePlayers.includes(i) && activePlayers.includes(j) ? '' : 'none';
        });
      });
    }

    function applyModeStates(changedMode = ''){
      const activePlayers = getActivePlayers();
      const activeCount = activePlayers.length;
      const canCompete = activeCount >= 2;
      const canVegas = activeCount === 4;

      const modeMatch = document.getElementById('modeMatch');
      const modePar = document.getElementById('modePar');
      const modeVegas = document.getElementById('modeVegas');
      const extMode = document.getElementById('extMode');

      if (!canCompete) {
        modeMatch.checked = false;
        modePar.checked = false;
      }
      if (!canVegas) {
        modeVegas.checked = false;
        extMode.checked = false;
      }

      setModeRow('modeRowVegas', modeVegas.checked, !canVegas);
      setModeRow('modeRowMatch', modeMatch.checked, !canCompete);
      setModeRow('modeRowPar', modePar.checked, !canCompete);
      setModeRow('modeRowExt', extMode.checked, !modeVegas.checked);

      modeVegas.disabled = !canVegas;
      modeMatch.disabled = !canCompete;
      modePar.disabled = !canCompete;
      extMode.disabled = !modeVegas.checked;

      playerIDs.forEach(i => {
        syncPlayerSmallMode(i, 'm', canCompete && modeMatch.checked && activePlayers.includes(i));
        syncPlayerSmallMode(i, 'p', canCompete && modePar.checked && activePlayers.includes(i));
      });

      if (changedMode === 'modeMatch' && modeMatch.checked) resetAllMatchDefaults();
      if (changedMode === 'modePar' && modePar.checked) resetAllParDefaults();

      document.getElementById('vegas-rank-area').style.display = modeVegas.checked ? 'block' : 'none';
      applyPlayerConfigVisibility();
      normalizeMatchPairStates();
      renderVegasRankInputs();
    }

    function setModeRow(rowId, active, disabled){
      const row = document.getElementById(rowId);
      if (!row) return;
      row.classList.toggle('active', active && !disabled);
      row.classList.toggle('disabled', disabled);
    }

    function syncPlayerSmallMode(playerId, suffix, enabled){
      const cb = document.getElementById(`p${playerId}_${suffix}`);
      if (!cb) return;
      if (!enabled) cb.checked = false;
      cb.disabled = !enabled;
      setPlayerSmallBoxState(playerId, suffix);
    }

    function togglePlayerSmallMode(playerId, suffix){
      const activePlayers = getActivePlayers();
      const parentOk = suffix === 'm' ? isMatchEnabled() : isParEnabled();
      if (!parentOk || !activePlayers.includes(playerId)) return;
      const cb = document.getElementById(`p${playerId}_${suffix}`);
      if (!cb || cb.disabled) return;
      cb.checked = !cb.checked;
      setPlayerSmallBoxState(playerId, suffix);
      if (suffix === 'm') normalizeMatchPairStates();
    }

    function initUI(){
      renderPlayerCards();
      renderVegasRankInputs();
      renderScoreboard();
      applyModeStates();
      lastActivePlayersSignature = getActivePlayers().join(',');
      refreshSavedCourseSelect();
      attachSelectAllBehavior(document);
      applyNumericKeyboardHints(document);
      bindCourseAutoLoad();
      applyScoreboardStickyTop();
      window.addEventListener('resize', applyScoreboardStickyTop);
    }

    function renderPlayerCards(){
      let nameHtml = `<div class="card" style="padding:15px;"><h2>2. 玩家名稱</h2><div class="name-grid">`;
      playerIDs.forEach(i => {
        nameHtml += `<div class="name-card"><label><small>${placeholders[i]}</small></label><input type="text" id="name${i}" placeholder="${placeholders[i]}" oninput="updateNames()"></div>`;
      });
      nameHtml += `</div></div>`;
      document.getElementById('player-name-area').innerHTML = nameHtml;

      let html = `<div class="grid-2">`;
      playerIDs.forEach(i => {
        html += `
          <div class="card" style="margin-bottom:0; padding:15px;">
            <div style="font-size:1.02rem; font-weight:900; color:var(--primary-dark); margin-bottom:4px;" id="pair-title-${i}">${nameOf(i)}</div>
            <div class="player-extra" id="player-extra-${i}">
              <div class="check-group" style="margin-top:10px;">
                <div class="check-item active" id="box_p${i}_m" onclick="togglePlayerSmallMode(${i}, 'm')"><input type="checkbox" id="p${i}_m" checked>比洞</div>
                <div class="check-item active" id="box_p${i}_p" onclick="togglePlayerSmallMode(${i}, 'p')"><input type="checkbox" id="p${i}_p" checked>抓PAR</div>
              </div>
              <div style="margin-top:12px; border-top:2px dashed #e6ece4; padding-top:10px;">
                <div class="small-note" style="margin-bottom:8px;">比洞設定：勾選代表有比。輸入正數 = 目前這位玩家讓對手；負數 = 對手讓目前這位玩家；空白視為平打 0 洞。</div>
                ${playerIDs.filter(j => j !== i).map(j => `
                  <div class="pair-row" id="pair-row-${i}-${j}">
                    <div class="pair-toggle" id="pair-toggle-${i}-${j}" onclick="togglePair(${i},${j})"><input type="checkbox" id="pair-check-${i}-${j}"></div>
                    <div class="pair-name" id="pair-name-${i}-${j}">${nameOf(j)}</div>
                    <input class="pair-score-input" type="number" id="pair-strokes-${i}-${j}" placeholder="0" oninput="handlePairStrokeInput(${i},${j})">
                  </div>
                `).join('')}
              </div>
            </div>
          </div>`;
      });
      html += `</div>`;
      document.getElementById('player-config-area').innerHTML = html;
      attachSelectAllBehavior(document.getElementById('player-name-area'));
      applyNumericKeyboardHints(document.getElementById('player-name-area'));
      attachSelectAllBehavior(document.getElementById('player-config-area'));
      applyNumericKeyboardHints(document.getElementById('player-config-area'));
      applyPlayerConfigVisibility();
      refreshAllPairDisabledState();
    }

    function renderVegasRankInputs(){
      const activePlayers = getActivePlayers();
      if (activePlayers.length !== 4) {
        document.getElementById('vegas-rank-area').style.display = 'none';
        return;
      }
      let html = `<h2>2. Vegas 起始洞排名</h2>`;
      html += `<div class="small-note" style="margin-bottom:12px;">請依起始洞開球距離輸入第1名到第4名，系統會自動以 1+4、2+3 分組。</div>`;
      html += `<div class="rank-grid">`;
      activePlayers.forEach(i => {
        const currentValue = document.getElementById(`vegasRank${i}`)?.value || '';
        html += `<div><label><small id="vr-name-${i}">${nameOf(i)}</small></label>
          <input type="hidden" id="vegasRank${i}" value="${currentValue}">
          <button type="button" class="vegas-rank-btn" id="vegasRankBtn${i}" onclick="openVegasRankPicker(${i})">${getVegasRankLabel(currentValue)}</button>
        </div>`;
      });
      html += `</div><div class="center-note" id="vegasStartPreview">起始洞分組：尚未設定</div>`;
      document.getElementById('vegas-rank-area').innerHTML = html;
      if (isVegasEnabled()) document.getElementById('vegas-rank-area').style.display = 'block';
      updateVegasPreview();
    }

    let lastActivePlayersSignature = '';
    let pendingHeavyNameRefresh = null;

    function syncNameLabelsOnly(){
      playerIDs.forEach(i => {
        const nm = nameOf(i);
        ['tag-'+i, 'pair-title-'+i, 'vr-name-'+i].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.innerText = nm;
        });
        playerIDs.forEach(j => {
          const pnm = document.getElementById(`pair-name-${i}-${j}`);
          if (pnm) pnm.innerText = nameOf(j);
        });
      });
      updateVegasPreview();
    }

    function updateNames(forceHeavy=false){
      syncNameLabelsOnly();
      const activeSignature = getActivePlayers().join(',');
      if (!forceHeavy && activeSignature === lastActivePlayersSignature) {
        return;
      }
      lastActivePlayersSignature = activeSignature;
      if (pendingHeavyNameRefresh) clearTimeout(pendingHeavyNameRefresh);
      pendingHeavyNameRefresh = setTimeout(() => {
        applyPlayerConfigVisibility();
        applyModeStates();
        renderVegasRankInputs();
        renderScoreboard();
        pendingHeavyNameRefresh = null;
      }, 0);
    }

    function refreshAllPairDisabledState(){
      const activePlayers = getActivePlayers();
      playerIDs.forEach(i => {
        playerIDs.forEach(j => {
          if (i===j) return;
          const toggle = document.getElementById(`pair-toggle-${i}-${j}`);
          const input = document.getElementById(`pair-strokes-${i}-${j}`);
          const active = !!document.getElementById(`pair-check-${i}-${j}`)?.checked;
          const playerEnabled = activePlayers.includes(i) && activePlayers.includes(j) && isMatchEnabled() && !!document.getElementById(`p${i}_m`)?.checked && !!document.getElementById(`p${j}_m`)?.checked;
          if (!toggle || !input) return;
          toggle.classList.toggle('disabled', !playerEnabled);
          toggle.classList.toggle('active', playerEnabled && active);
          input.disabled = !playerEnabled || !active;
        });
      });
    }

    function setPairState(i,j,checked,value,fromSync=false){
      const cb = document.getElementById(`pair-check-${i}-${j}`);
      const tg = document.getElementById(`pair-toggle-${i}-${j}`);
      const inp = document.getElementById(`pair-strokes-${i}-${j}`);
      if (!cb || !tg || !inp) return;
      const activePlayers = getActivePlayers();
      const pairEnabled = activePlayers.includes(i) && activePlayers.includes(j) && isMatchEnabled() && !!document.getElementById(`p${i}_m`)?.checked && !!document.getElementById(`p${j}_m`)?.checked;
      cb.checked = checked && pairEnabled;
      tg.classList.toggle('active', cb.checked);
      tg.classList.toggle('disabled', !pairEnabled);
      inp.disabled = !cb.checked;
      inp.value = cb.checked ? (value ?? '') : '';
      if (!fromSync) {
        const mirroredValue = cb.checked ? (value === '' || value === null || value === undefined ? '' : String(-1 * Number(value || 0))) : '';
        setPairState(j,i,cb.checked,mirroredValue,true);
      }
    }

    function togglePair(i,j){
      const activePlayers = getActivePlayers();
      const playersReady = activePlayers.includes(i) && activePlayers.includes(j) && isMatchEnabled() && !!document.getElementById(`p${i}_m`)?.checked && !!document.getElementById(`p${j}_m`)?.checked;
      if (!playersReady) return;
      const cb = document.getElementById(`pair-check-${i}-${j}`);
      const currentValue = document.getElementById(`pair-strokes-${i}-${j}`).value;
      if (cb.checked) setPairState(i,j,false,'');
      else setPairState(i,j,true,currentValue === '' ? 0 : currentValue);
      refreshAllPairDisabledState();
    }

    function handlePairStrokeInput(i,j){
      const activePlayers = getActivePlayers();
      const playersReady = activePlayers.includes(i) && activePlayers.includes(j) && isMatchEnabled() && !!document.getElementById(`p${i}_m`)?.checked && !!document.getElementById(`p${j}_m`)?.checked;
      if (!playersReady) return;
      const input = document.getElementById(`pair-strokes-${i}-${j}`);
      const raw = input.value;
      setPairState(i,j,true,raw === '' ? 0 : raw);
      refreshAllPairDisabledState();
    }

    function bindCourseAutoLoad(){
      const courseInput = document.getElementById('courseName');
      courseInput.addEventListener('input', () => {
          const name = courseInput.value.trim();
        if (!name) return;
        const all = getSavedCourses();
        const key = normalizeCourseName(name);
        if (all[key]) {
          applyCourseData(all[key]);
          refreshSavedCourseSelect(key);
          showWarning('已自動帶入已儲存球場資料。', 'global');
        }
      });
    }

    function getSavedCourses(){
      try { return JSON.parse(localStorage.getItem('golfSavedCoursesV21') || '{}'); }
      catch(e){ return {}; }
    }

    function setSavedCourses(data){
      localStorage.setItem('golfSavedCoursesV21', JSON.stringify(data));
    }

    function buildCoursesBackupPayload(){
      return {
        version: 1,
        exportedAt: new Date().toISOString(),
        app: 'Golf Score',
        storageKey: 'golfSavedCoursesV21',
        courses: getSavedCourses()
      };
    }

    function exportCoursesJson(){
      const courses = getSavedCourses();
      const keys = Object.keys(courses);
      if (!keys.length) {
        alert('目前沒有可匯出的球場資料。');
        return;
      }
      const payload = buildCoursesBackupPayload();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const stamp = new Date();
      const pad = n => String(n).padStart(2, '0');
      const filename = `golf-courses-backup-${stamp.getFullYear()}${pad(stamp.getMonth()+1)}${pad(stamp.getDate())}-${pad(stamp.getHours())}${pad(stamp.getMinutes())}${pad(stamp.getSeconds())}.json`;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showWarning(`球場資料已匯出：${filename}`, 'scoring');
    }

    function triggerImportCoursesJson(){
      document.getElementById('importCoursesFile')?.click();
    }

    function normalizeImportedCourses(raw){
      if (!raw || typeof raw !== 'object') throw new Error('格式錯誤');
      const sourceCourses = raw.courses && typeof raw.courses === 'object' ? raw.courses : raw;
      const normalized = {};
      Object.values(sourceCourses).forEach(item => {
        if (!item || typeof item !== 'object') return;
        const name = String(item.name || '').trim();
        if (!name) return;
        const par = {};
        const hdcp = {};
        for (let h = 1; h <= 18; h++) {
          par[h] = item.par?.[h] ?? item.par?.[String(h)] ?? '';
          hdcp[h] = item.hdcp?.[h] ?? item.hdcp?.[String(h)] ?? '';
        }
        normalized[normalizeCourseName(name)] = { name, par, hdcp };
      });
      return normalized;
    }

    function importCoursesJson(event){
      const file = event?.target?.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const imported = normalizeImportedCourses(parsed);
          const keys = Object.keys(imported);
          if (!keys.length) throw new Error('找不到可匯入的球場資料');
          const existing = getSavedCourses();
          const merged = { ...existing, ...imported };
          setSavedCourses(merged);
          refreshSavedCourseSelect();
          showWarning(`已匯入 ${keys.length} 個球場資料。`, 'scoring');
        } catch (err) {
          alert('匯入失敗，請確認你選的是本系統匯出的 JSON 檔案。');
        } finally {
          event.target.value = '';
        }
      };
      reader.onerror = () => {
        alert('讀取檔案失敗，請再試一次。');
        event.target.value = '';
      };
      reader.readAsText(file, 'utf-8');
    }

    function refreshSavedCourseSelect(selectedKey=''){
      const sel = document.getElementById('savedCourseSelect');
      if (!sel) return;
      const all = getSavedCourses();
      const keys = Object.keys(all).sort((a,b) => (all[a].name || '').localeCompare(all[b].name || ''));
      let html = `<option value="">請選擇已儲存球場</option>`;
      keys.forEach(k => {
        html += `<option value="${k}">${all[k].name}</option>`;
      });
      sel.innerHTML = html;
      if (selectedKey && all[selectedKey]) sel.value = selectedKey;
    }

    function gatherCourseData(){
      const par = {}, hdcp = {};
      for (let h=1; h<=18; h++) {
        par[h] = document.getElementById(`cell_P_${h}`)?.value ?? '';
        hdcp[h] = document.getElementById(`cell_Hd_${h}`)?.value ?? '';
      }
      return { name: (document.getElementById('courseName').value || '').trim(), par, hdcp };
    }

    function applyCourseData(data){
      if (!data) return;
      document.getElementById('courseName').value = data.name || '';
      for (let h=1; h<=18; h++) {
        if (document.getElementById(`cell_P_${h}`)) document.getElementById(`cell_P_${h}`).value = data.par?.[h] ?? '';
        if (document.getElementById(`cell_Hd_${h}`)) document.getElementById(`cell_Hd_${h}`).value = data.hdcp?.[h] ?? '';
      }
      updateParTotals();
      playerIDs.forEach(p => { for (let h=1; h<=18; h++) drawMark(p,h,false); });
    }

    function handleSavedCourseSelect(){
      const key = document.getElementById('savedCourseSelect').value;
      if (!key) return;
      const all = getSavedCourses();
      if (!all[key]) return;
      applyCourseData(all[key]);
      showWarning('已載入球場資料。', 'global');
    }

    function saveCourseProfile(){
      const data = gatherCourseData();
      if (!data.name) {
        alert('請先輸入球場名稱。');
        return;
      }
      const all = getSavedCourses();
      const key = normalizeCourseName(data.name);
      all[key] = data;
      setSavedCourses(all);
      refreshSavedCourseSelect(key);
      showWarning('球場資料已儲存。', 'scoring');
    }

    function deleteCourseProfile(){
      const name = (document.getElementById('courseName').value || '').trim();
      if (!name) { alert('目前沒有可刪除的球場名稱。'); return; }
      const key = normalizeCourseName(name);
      const all = getSavedCourses();
      if (!all[key]) { alert('找不到已儲存的同名球場資料。'); return; }
      if (!confirm(`確定要刪除「${all[key].name}」的球場資料嗎？`)) return;
      delete all[key];
      setSavedCourses(all);
      refreshSavedCourseSelect('');
      showWarning('球場資料已刪除。', 'scoring');
    }

    function handleCourseInput(orderIdx, type, hole){
      updateParTotals();
      if (type === 'P') {
        document.getElementById(`cell_Hd_${hole}`).focus();
      }
    }

    function updateParTotals(){
      let out = 0, inn = 0;
      for (let h=1; h<=9; h++) out += parseFloat(document.getElementById(`cell_P_${h}`)?.value) || 0;
      for (let h=10; h<=18; h++) inn += parseFloat(document.getElementById(`cell_P_${h}`)?.value) || 0;
      const op = document.getElementById('out_P');
      const ip = document.getElementById('in_P');
      const tp = document.getElementById('tot_P');
      if (op) op.innerText = out;
      if (ip) ip.innerText = inn;
      if (tp) tp.innerText = out + inn;
    }

    function drawMark(player, hole, jump=true){
      const el = document.getElementById(`cell_${player}_${hole}`);
      const score = parseFloat(el?.value) || 0;
      const par = parseFloat(document.getElementById(`cell_P_${hole}`)?.value) || 0;
      const mark = document.getElementById(`mark_${player}_${hole}`);
      if (!mark) return;
      mark.className = '';
      if (score > 0 && par > 0) {
        const diff = score - par;
        if (diff === -1) mark.className = 'mark-circle';
        else if (diff <= -2 || score === 1) mark.className = 'mark-double-circle';
        else if (diff === 1) mark.className = 'mark-square';
        else if (diff >= 2) mark.className = 'mark-double-square';
      }
      updatePlayerTotals(player);
      if (jump) jumpPlayerCell(player, hole);
    }

    function jumpPlayerCell(player, hole){
      const order = getPlayOrder();
      const idx = order.indexOf(hole);
      const activePlayers = getActivePlayers();
      const rowIdx = activePlayers.indexOf(player);
      if (idx === -1 || rowIdx === -1) return;
      if (rowIdx < activePlayers.length - 1) document.getElementById(`cell_${activePlayers[rowIdx+1]}_${hole}`)?.focus();
      else if (idx < order.length - 1) document.getElementById(`cell_${activePlayers[0]}_${order[idx+1]}`)?.focus();
    }

    function updatePlayerTotals(player){
      let out=0, inn=0;
      for (let h=1; h<=9; h++) out += parseFloat(document.getElementById(`cell_${player}_${h}`)?.value) || 0;
      for (let h=10; h<=18; h++) inn += parseFloat(document.getElementById(`cell_${player}_${h}`)?.value) || 0;
      document.getElementById(`out_${player}`).innerText = out;
      document.getElementById(`in_${player}`).innerText = inn;
      document.getElementById(`tot_${player}`).innerText = out + inn;
    }

    function getHoleInfo(hole){
      return {
        par: parseFloat(document.getElementById(`cell_P_${hole}`)?.value) || 0,
        hdcp: parseInt(document.getElementById(`cell_Hd_${hole}`)?.value) || 0
      };
    }

    function getPlayerScore(player, hole){
      return parseFloat(document.getElementById(`cell_${player}_${hole}`)?.value) || 0;
    }

    function getGrossLabel(score, par){
      if (!score || !par) return {points:0, type:'none'};
      if (score === 1) return { points: parseFloat(document.getElementById('mHIO').value) || 0, type:'hio' };
      const diff = score - par;
      if (diff === 0) return { points: 1, type:'par' };
      if (diff === -1) return { points: parseFloat(document.getElementById('mB').value) || 0, type:'birdie' };
      if (diff <= -2) {
        if (par === 4) return { points: parseFloat(document.getElementById('mE4').value) || 0, type:'eagle4' };
        if (par === 5) return { points: parseFloat(document.getElementById('mE5').value) || 0, type:'eagle5' };
        return { points: parseFloat(document.getElementById('mB').value) || 0, type:'birdie' };
      }
      return { points: 0, type:'none' };
    }

    function getMatchMultiplier(score, par){
      const label = getGrossLabel(score, par);
      return label.points > 0 ? label.points : 1;
    }

    function getActiveParPlayers(){
      return getActivePlayers().filter(i => document.getElementById(`p${i}_p`)?.checked && isParEnabled());
    }

    function getPairMeta(i,j){
      const checked = !!document.getElementById(`pair-check-${i}-${j}`)?.checked;
      let value = document.getElementById(`pair-strokes-${i}-${j}`)?.value ?? '';
      value = value === '' ? 0 : parseFloat(value);
      return { checked, value };
    }

    function getStrokeAllowance(pairValue, hole){
      const info = getHoleInfo(hole);
      const par = info.par;
      const hd = info.hdcp;
      if (!pairValue) return 0;
      const abs = Math.abs(pairValue);
      if (pairValue > 0) {
        return 0;
      }
      if (abs === 18) {
        if (par === 5) return 2;
        if (par === 4) return 1;
        if (par === 3) return 0.5;
        return 0;
      }
      if (hd > 0 && hd <= abs) return 1;
      return 0;
    }

    function getNetScoreForPair(player, opponent, hole){
      const meta = getPairMeta(player, opponent);
      const gross = getPlayerScore(player, hole);
      if (!gross) return 0;
      const allowance = getStrokeAllowance(meta.value, hole);
      return gross - allowance;
    }

    function buildMatchPairs(){
      const pairs = [];
      const activePlayers = getActivePlayers();
      pairKeys.forEach(key => {
        const [a,b] = key.split('_').map(Number);
        if (!activePlayers.includes(a) || !activePlayers.includes(b)) return;
        const meta = getPairMeta(a,b);
        if (!meta.checked) return;
        const pa = !!document.getElementById(`p${a}_m`)?.checked;
        const pb = !!document.getElementById(`p${b}_m`)?.checked;
        if (!pa || !pb || !isMatchEnabled()) return;
        pairs.push([a,b]);
      });
      return pairs;
    }

    function validateBeforeResult(){
      const warnings = [];
      const errors = [];
      const hdcpNums = [];
      for (let h=1; h<=18; h++) {
        const v = parseInt(document.getElementById(`cell_Hd_${h}`)?.value);
        if (!Number.isNaN(v)) hdcpNums.push(v);
      }
      const sorted = [...hdcpNums].sort((a,b)=>a-b);
      const should = Array.from({length:18}, (_,i)=>i+1);
      if (sorted.length !== 18 || sorted.some((v,i)=>v!==should[i])) {
        warnings.push('球場 HDCP 建議為 1~18 且不可重複。');
      }

      const start = parseInt(document.getElementById('startHole').value);
      if (!(start >= 1 && start <= 18)) errors.push('起始洞必須為 1~18。');

      if (isVegasEnabled()) {
        const ranks = getActivePlayers().map(i => document.getElementById(`vegasRank${i}`)?.value || '');
        if (ranks.some(v => !v)) errors.push('Vegas 起始洞排名未填完整。');
        const unique = new Set(ranks);
        if (unique.size !== 4) errors.push('Vegas 起始洞排名不可重複。');
      }

      if (isMatchEnabled()) {
        const pairs = buildMatchPairs();
        pairs.forEach(([a,b]) => {
          const input = document.getElementById(`pair-strokes-${a}-${b}`);
          if (!input) return;
          if (input.value === '') return; // 空白視為0
          const n = Number(input.value);
          if (Number.isNaN(n) || Math.abs(n) > 18) errors.push(`${nameOf(a)} 與 ${nameOf(b)} 的讓洞數必須介於 -18 到 18。`);
        });
      }

      showWarning(warnings.join('\n'), 'scoring');
      showDanger(errors.join('\n'), 'scoring');
      return { warnings, errors };
    }

    function showWarning(msg, area='global'){
      const map = { global:'global-warning', scoring:'scoring-warning' };
      const el = document.getElementById(map[area] || 'global-warning');
      if (!el) return;
      if (!msg) { el.style.display='none'; el.innerText=''; return; }
      el.style.display='block';
      el.innerText = msg;
    }

    function showDanger(msg, area='scoring'){
      const map = { scoring:'scoring-danger' };
      const el = document.getElementById(map[area] || 'scoring-danger');
      if (!el) return;
      if (!msg) { el.style.display='none'; el.innerText=''; return; }
      el.style.display='block';
      el.innerText = msg;
    }

      getActivePlayers().forEach(i => { mapping[parseInt(document.getElementById(`vegasRank${i}`).value)] = i; });
      return [[mapping[1], mapping[4]], [mapping[2], mapping[3]]];

    function setVegasRank(playerId, value){

      if (input) input.value = value;

    function updateVegasPreview(){
      const preview = document.getElementById('vegasStartPreview');
      if (!preview) return;
      if (!isVegasEnabled()) { preview.innerText = 'Vegas 未啟用'; return; }
      const values = getActivePlayers().map(i => document.getElementById(`vegasRank${i}`)?.value || '');
      if (values.some(v => !v) || new Set(values).size !== 4) {
        preview.innerText = '起始洞分組：尚未設定';
        return;
      }
      const [[a,b],[c,d]] = getVegasStartTeams();
      preview.innerText = `起始洞分組：${nameOf(a)} + ${nameOf(b)} / ${nameOf(c)} + ${nameOf(d)}`;

    function comparePlayersByBacktrack(a,b,currentOrderIndex,order){
      for (let step = currentOrderIndex-1; step >= 0; step--) {
        const hole = order[step];
        const sa = getPlayerScore(a, hole);
        const sb = getPlayerScore(b, hole);
        if (sa !== sb) return sa - sb;
      }
      const ra = parseInt(document.getElementById(`vegasRank${a}`).value) || 99;
      const rb = parseInt(document.getElementById(`vegasRank${b}`).value) || 99;
      return ra - rb;
    }

    function rankPlayersForVegas(currentOrderIndex, order){
      const arr = [...getActivePlayers()];
      const prevHole = order[currentOrderIndex-1];
      arr.sort((a,b) => {
        const sa = getPlayerScore(a, prevHole);
        const sb = getPlayerScore(b, prevHole);
        if (sa !== sb) return sa - sb;
        return comparePlayersByBacktrack(a,b,currentOrderIndex,order);
      });
      return arr;
    }

    function formatSigned(value, suffix=''){
      return `${value > 0 ? '+' : ''}${value}${suffix}`;
    }

    function escapeHtml(str=''){
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function buildCollapseBlock(title, innerHtml, open=false){
      const cls = open ? 'collapse-block open' : 'collapse-block';
      return `<div class="${cls}"><button type="button" class="collapse-head" onclick="this.parentNode.classList.toggle('open')">${title}</button><div class="collapse-body">${innerHtml}</div></div>`;
    }

    function splitLogsByNine(logs){
      return {
        front: logs.filter(x => x.hole >= 1 && x.hole <= 9),
        back: logs.filter(x => x.hole >= 10 && x.hole <= 18)
      };
    }


    function renderSortedRows(values, names, activePlayers){
      const arr = activePlayers.map(i => ({ i, name:names[i], pts: values[i] ?? 0 }));
      arr.sort((a,b) => b.pts - a.pts || a.i - b.i);
      return arr.map(x => `<div class="res-row"><span>${escapeHtml(x.name)}</span><span class="${x.pts>0?'red-text':x.pts<0?'':'muted'}">${x.pts>0?'+':''}${x.pts} 點</span></div>`).join('');
    }

    function buildMatchDetails(order, names){
      const pairs = buildMatchPairs();
      return pairs.map(([a,b]) => {
        const logs = [];
        let front = 0;
        let back = 0;
        order.forEach(hole => {
          const grossA = getPlayerScore(a, hole);
          const grossB = getPlayerScore(b, hole);
          if (!grossA || !grossB) return;
          const netA = getNetScoreForPair(a,b,hole);
          const netB = getNetScoreForPair(b,a,hole);
          const holePar = getHoleInfo(hole).par;
          let delta = 0;
          let text = `第 ${hole} 洞　平手 0`;
          if (netA < netB) {
            delta = getMatchMultiplier(grossA, holePar);
            text = `第 ${hole} 洞　${names[a]} 贏 ${names[b]} ${formatSigned(delta)}`;
          } else if (netB < netA) {
            delta = -getMatchMultiplier(grossB, holePar);
            text = `第 ${hole} 洞　${names[b]} 贏 ${names[a]} ${formatSigned(Math.abs(delta))}`;
          }
          if (hole <= 9) front += delta; else back += delta;
          logs.push({ hole, delta, text });
        });
        return { a, b, front, back, total: front + back, logs };
      });
    }

    function buildMatrixTable(title, matrix, totals, activePlayers, names, showPlus=false){
      const numberText = (value) => {
        if (value === null || value === undefined || Number.isNaN(value)) return '-';
        if (value === 0) return '0';
        return showPlus && value > 0 ? `+${value}` : String(value);
      };
      let html = `<table class="matrix-table"><tr><th></th>${activePlayers.map(i => `<th>${escapeHtml(names[i])}</th>`).join('')}<th class="total-col">總計</th></tr>`;
      activePlayers.forEach(i => {
        html += `<tr><th>${escapeHtml(names[i])}</th>`;
        activePlayers.forEach(j => { html += `<td>${i === j ? '-' : numberText(matrix[i]?.[j] ?? 0)}</td>`; });
        html += `<td class="total-col">${numberText(totals[i] ?? 0)}</td></tr>`;
      });
      html += `</table>`;
      return html;
    }

    function buildParResults(order, activePlayers){
      const matrix = playerIDs.map(() => playerIDs.map(() => 0));
      const totals = [0,0,0,0];
      if (!isParEnabled()) return { matrix, totals };
      order.forEach(hole => {
        const par = getHoleInfo(hole).par;
        if (!par) return;
        const participants = activePlayers.filter(p => document.getElementById(`p${p}_p`)?.checked);
        if (!participants.length) return;
        const labels = participants.map(p => ({ p, val: getGrossLabel(getPlayerScore(p,hole), par).points }));
        const max = Math.max(...labels.map(x => x.val));
        if (max <= 0) return;
        const winners = labels.filter(x => x.val === max);
        if (winners.length !== 1) return;
        const winner = winners[0];
        labels.forEach(item => {
          if (item.p === winner.p) return;
          const diff = winner.val - item.val;
          matrix[winner.p][item.p] += diff;
          matrix[item.p][winner.p] -= diff;
          totals[winner.p] += diff;
          totals[item.p] -= diff;
        });
      });
      return { matrix, totals };
    }

    function buildInlineStyleCss(){
      let css = '';
      Array.from(document.styleSheets || []).forEach(sheet => {
        try { Array.from(sheet.cssRules || []).forEach(rule => { css += rule.cssText + '\n'; }); } catch (e) {}
      });
      css += `*{box-sizing:border-box;} body{margin:0 !important;} .export-wrap{display:none !important;} table{border-collapse:collapse;} input,select,button{font-family:inherit;}`;
      return css;
    }

    function inlineFormValues(root){
      root.querySelectorAll('input, textarea, select').forEach(el => {
        const tag = el.tagName.toLowerCase();
        if (tag === 'select') {
          const span = document.createElement('span');
          span.textContent = el.options[el.selectedIndex]?.text || '';
          span.setAttribute('style', window.getComputedStyle(el).cssText + ';display:flex;align-items:center;justify-content:center;white-space:pre-wrap;');
          el.replaceWith(span);
          return;
        }
        if (el.type === 'checkbox') {
          const span = document.createElement('span');
          span.textContent = el.checked ? '☑' : '☐';
          span.setAttribute('style', window.getComputedStyle(el).cssText + ';display:inline-flex;align-items:center;justify-content:center;');
          el.replaceWith(span);
          return;
        }
        el.setAttribute('value', el.value || '');
        if (tag === 'textarea') el.textContent = el.value || '';
      });
    }

    function closeExportPreview(event){
      if (event && event.target !== document.getElementById('exportPreviewOverlay')) return;
      document.getElementById('exportPreviewOverlay').classList.remove('show');
      document.getElementById('exportPreviewImage').src = '';
    }

    function exportResultPreview(){
      try {
        const table = document.querySelector('#final-money .summary-table');
        if (!table) {
          alert('請先到結算頁產生資料後，再輸出圖片。');
          return;
        }
        const rows = Array.from(table.querySelectorAll('tr')).map(tr =>
          Array.from(tr.children).map(td => (td.innerText || td.textContent || '').trim())
        ).filter(r => r.length);
        if (rows.length < 2) {
          alert('目前沒有可輸出的結算資料。');
          return;
        }

        const title = '高爾夫總結算';
        const course = (document.getElementById('courseName')?.value || '').trim();
        const subtitle = course ? `球場：${course}` : '球場：未填寫';
        const stamp = new Date();
        const stampText = `${stamp.getFullYear()}/${String(stamp.getMonth()+1).padStart(2,'0')}/${String(stamp.getDate()).padStart(2,'0')} ${String(stamp.getHours()).padStart(2,'0')}:${String(stamp.getMinutes()).padStart(2,'0')}`;

        const colCount = Math.max(...rows.map(r => r.length));
        const colWidths = [190, 120, 120, 120, 130, 150].slice(0, colCount);
        while (colWidths.length < colCount) colWidths.push(120);
        const rowHeight = 62;
        const pad = 28;
        const headTop = 150;
        const tableWidth = colWidths.reduce((a,b)=>a+b,0);
        const width = tableWidth + pad * 2;
        const height = headTop + rows.length * rowHeight + 36;

        const canvas = document.createElement('canvas');
        const scale = Math.max(2, Math.min(3, window.devicePixelRatio || 1));
        canvas.width = Math.round(width * scale);
        canvas.height = Math.round(height * scale);
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);

        ctx.fillStyle = '#2f6b3f';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#ffffff';
        const cardX = 16;
        const cardY = 16;
        const cardW = width - 32;
        const cardH = height - 32;
        const radius = 20;
        ctx.beginPath();
        ctx.moveTo(cardX + radius, cardY);
        ctx.arcTo(cardX + cardW, cardY, cardX + cardW, cardY + cardH, radius);
        ctx.arcTo(cardX + cardW, cardY + cardH, cardX, cardY + cardH, radius);
        ctx.arcTo(cardX, cardY + cardH, cardX, cardY, radius);
        ctx.arcTo(cardX, cardY, cardX + cardW, cardY, radius);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#1e4d2b';
        ctx.font = '900 34px sans-serif';
        ctx.fillText(title, pad + 8, 62);
        ctx.font = '700 20px sans-serif';
        ctx.fillStyle = '#4f6456';
        ctx.fillText(subtitle, pad + 8, 95);
        ctx.fillText(`輸出時間：${stampText}`, pad + 8, 122);

        let y = headTop;
        rows.forEach((row, rowIndex) => {
          let x = pad;
          row.forEach((cell, colIndex) => {
            const w = colWidths[colIndex] || 120;
            ctx.fillStyle = rowIndex === 0 ? '#2f6b3f' : '#ffffff';
            ctx.fillRect(x, y, w, rowHeight);
            ctx.strokeStyle = '#d6e2d3';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, w, rowHeight);
            ctx.fillStyle = rowIndex === 0 ? '#ffffff' : '#18311f';
            ctx.font = rowIndex === 0 ? '900 19px sans-serif' : '800 21px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(cell, x + w / 2, y + rowHeight / 2);
            x += w;
          });
          y += rowHeight;
        });

        const img = document.getElementById('exportPreviewImage');
        img.src = canvas.toDataURL('image/png');
        document.getElementById('exportPreviewOverlay').classList.add('show');
      } catch (err) {
        console.error(err);
        alert('圖片輸出失敗，請把這個版本回傳給我，我再幫你修。');
      }
    }

    function calculateFinal(){
      const validation = validateBeforeResult();
      if (validation.errors.length) {
        openTab('scoring');
        return;
      }
      const activePlayers = getActivePlayers();
      const names = Object.fromEntries(activePlayers.map(i => [i, nameOf(i)]));
      const pointValue = parseFloat(document.getElementById('pointVal').value) || 0;
      const order = getPlayOrder();
      updateVegasPreview();

      const matchMatrix = playerIDs.map(() => playerIDs.map(() => null));
      const matchPoints = [0,0,0,0];
      const matchPairs = buildMatchPairs();
      matchPairs.forEach(([a,b]) => {
        let aScore = 0;
        let bScore = 0;
        order.forEach(hole => {
          const grossA = getPlayerScore(a, hole);
          const grossB = getPlayerScore(b, hole);
          if (!grossA || !grossB) return;
          const netA = getNetScoreForPair(a,b,hole);
          const netB = getNetScoreForPair(b,a,hole);
          const holePar = getHoleInfo(hole).par;
          if (netA < netB) {
            const pts = getMatchMultiplier(grossA, holePar);
            aScore += pts; bScore -= pts; matchPoints[a] += pts; matchPoints[b] -= pts;
          } else if (netB < netA) {
            const pts = getMatchMultiplier(grossB, holePar);
            bScore += pts; aScore -= pts; matchPoints[b] += pts; matchPoints[a] -= pts;
          }
        });
        matchMatrix[a][b] = aScore;
        matchMatrix[b][a] = bScore;
      });
      activePlayers.forEach(i => activePlayers.forEach(j => { matchMatrix[i][j] = i === j ? 0 : (matchMatrix[i][j] ?? 0); }));

      const parResult = buildParResults(order, activePlayers);
      const parPoints = parResult.totals;
      const parMatrix = parResult.matrix;

      const vegasPoints = [0,0,0,0];
      const vegasHoleWins = [];
      if (isVegasEnabled() && activePlayers.length === 4) {
        let currentTeams = getVegasStartTeams();
        let carry = 1;
        order.forEach((hole, idx) => {
          if (idx > 0) {
            const prevTie = vegasHoleWins[vegasHoleWins.length-1]?.tie === true;
            if (!prevTie) {
              const ranked = rankPlayersForVegas(idx, order);
              currentTeams = [[ranked[0], ranked[3]], [ranked[1], ranked[2]]];
            }
          }
          const [teamA, teamB] = currentTeams;
          const sumA = teamA.reduce((acc,p) => acc + getPlayerScore(p,hole), 0);
          const sumB = teamB.reduce((acc,p) => acc + getPlayerScore(p,hole), 0);
          if (!sumA || !sumB) return;
          if (sumA === sumB) {
            vegasHoleWins.push({ hole, tie: true, teams: currentTeams.map(t => [...t]), carry, carryAbandoned: idx === order.length - 1 });
            if (isExtEnabled()) carry += 1;
            return;
          }
          const used = isExtEnabled() ? carry : 1;
          const winner = sumA < sumB ? teamA : teamB;
          const loser = sumA < sumB ? teamB : teamA;
          winner.forEach(p => vegasPoints[p] += used);
          loser.forEach(p => vegasPoints[p] -= used);
          vegasHoleWins.push({ hole, tie: false, winner: [...winner], teams: currentTeams.map(t => [...t]), points: used });
          carry = 1;
        });
      }

      const totalPoints = [0,0,0,0];
      activePlayers.forEach(i => { totalPoints[i] = matchPoints[i] + parPoints[i] + vegasPoints[i]; });

      const matchDetails = buildMatchDetails(order, names);
      renderMatchOutput(matchMatrix, matchPoints, names, activePlayers);
      renderMatchDetailOutput(matchDetails, names);
      renderParOutput(parMatrix, parPoints, names, activePlayers);
      renderVegasOutput(vegasPoints, names, activePlayers);
      renderVegasHoleOutput(vegasHoleWins, names);
      renderFinalOutput(matchPoints, parPoints, vegasPoints, totalPoints, pointValue, names, activePlayers);
      renderCaptureSections(parMatrix, parPoints, vegasPoints, matchMatrix, matchPoints, names, activePlayers);
      openTab('result');
    }

    function renderMatchOutput(matrix, totals, names, activePlayers){
      if (!isMatchEnabled()) {
        document.getElementById('match-output').innerHTML = `<div class="center-note">本日未啟用比洞</div>`;
        return;
      }
      document.getElementById('match-output').innerHTML = buildMatrixTable('Match', matrix, totals, activePlayers, names, false);
    }

    function renderMatchDetailOutput(details, names){
      if (!isMatchEnabled()) {
        document.getElementById('match-detail-output').innerHTML = `<div class="center-note">本日未啟用比洞</div>`;
        return;
      }
      if (!details.length) {
        document.getElementById('match-detail-output').innerHTML = `<div class="center-note">本日沒有比洞對戰明細</div>`;
        return;
      }
      let inner = '';
      details.forEach((item, idx) => {
        const split = splitLogsByNine(item.logs);
        const frontHtml = `<div class="section-summary">前 9 洞：${names[item.a]} ${formatSigned(item.front)} / ${names[item.b]} ${formatSigned(-item.front)}</div>` + (split.front.length ? `<div class="hole-win-log">${split.front.map(log => `<div class="hole-win-item">${escapeHtml(log.text)}</div>`).join('')}</div>` : `<div class="center-note">前 9 洞沒有完整紀錄</div>`);
        const backHtml = `<div class="section-summary">後 9 洞：${names[item.a]} ${formatSigned(item.back)} / ${names[item.b]} ${formatSigned(-item.back)}</div>` + (split.back.length ? `<div class="hole-win-log">${split.back.map(log => `<div class="hole-win-item">${escapeHtml(log.text)}</div>`).join('')}</div>` : `<div class="center-note">後 9 洞沒有完整紀錄</div>`);
        const title = `${names[item.a]} vs ${names[item.b]}｜前9 ${formatSigned(item.front)}｜後9 ${formatSigned(item.back)}｜總計 ${formatSigned(item.total)}`;
        inner += buildCollapseBlock(title, frontHtml + backHtml, idx === 0);
      });
      document.getElementById('match-detail-output').innerHTML = buildCollapseBlock('展開／收起比洞明細', inner, false);
    }

    function renderParOutput(matrix, totals, names, activePlayers){
      if (!isParEnabled()) {
        document.getElementById('par-output').innerHTML = `<div class="center-note">本日未啟用抓PAR</div>`;
        return;
      }
      const participants = getActiveParPlayers();
      if (!participants.length) {
        document.getElementById('par-output').innerHTML = `<div class="center-note">沒有玩家參與抓PAR</div>`;
        return;
      }
      document.getElementById('par-output').innerHTML = buildMatrixTable('抓PAR', matrix, totals, participants, names, false) + `<div class="matrix-note">右側總計就是每位玩家抓PAR點數的來源。</div>`;
    }

    function renderVegasOutput(points, names, activePlayers){
      if (!isVegasEnabled()) {
        document.getElementById('vegas-output').innerHTML = `<div class="center-note">本日未啟用 Vegas</div>`;
        return;
      }
      document.getElementById('vegas-output').innerHTML = renderSortedRows(points, names, activePlayers);
    }

    function renderVegasHoleOutput(logs, names){
      if (!isVegasEnabled()) {
        document.getElementById('vegas-hole-output').innerHTML = `<div class="center-note">本日未啟用 Vegas</div>`;
        return;
      }
      if (!logs.length) {
        document.getElementById('vegas-hole-output').innerHTML = `<div class="center-note">本日沒有 Vegas 勝負紀錄</div>`;
        return;
      }
      const split = splitLogsByNine(logs);
      const buildSection = (title, sectionLogs, open=false) => {
        const tieCount = sectionLogs.filter(x => x.tie).length;
        const decided = sectionLogs.filter(x => !x.tie);
        const pointTotal = decided.reduce((sum, x) => sum + (x.points || 0), 0);
        const summary = `<div class="section-summary">${title}：勝負洞 ${decided.length} 洞，平手 ${tieCount} 洞，累計結算點數 ${pointTotal}</div>`;
        const items = sectionLogs.map(item => item.tie ? `<div class="hole-win-item">第 ${item.hole} 洞　0</div>` : `<div class="hole-win-item">第 ${item.hole} 洞　${item.winner.map(p => names[p]).join('、')} ${item.points}</div>`).join('');
        return buildCollapseBlock(`${title} 明細`, summary + `<div class="hole-win-log">${items}</div>`, open);
      };
      const inner = buildSection('前 9 洞', split.front, true) + buildSection('後 9 洞', split.back, false);
      document.getElementById('vegas-hole-output').innerHTML = buildCollapseBlock('展開／收起 Vegas 明細', inner, false);
    }

    function renderCaptureSections(parMatrix, parPoints, vegasPoints, matchMatrix, matchPoints, names, activePlayers){
      return;
    }

    function renderFinalOutput(matchPoints, parPoints, vegasPoints, totalPoints, pointValue, names, activePlayers){
      const rows = activePlayers.map(i => ({ i, name:names[i], match: matchPoints[i], par: parPoints[i], vegas: vegasPoints[i], total: totalPoints[i], money: Math.round(totalPoints[i] * pointValue) })).sort((a,b) => b.total - a.total || a.i - b.i);
      let html = `<table class="summary-table"><tr><th>玩家</th>${isMatchEnabled()?'<th>Match</th>':''}${isParEnabled()?'<th>抓PAR</th>':''}${isVegasEnabled()?'<th>Vegas</th>':''}<th>總點數</th><th>金額</th></tr>`;
      rows.forEach(r => {
        const totalCls = r.total > 0 ? 'red-text' : r.total < 0 ? '' : 'muted';
        const moneyCls = r.money > 0 ? 'red-text' : r.money < 0 ? '' : 'muted';
        html += `<tr><td>${r.name}</td>${isMatchEnabled()?`<td>${r.match}</td>`:''}${isParEnabled()?`<td>${r.par}</td>`:''}${isVegasEnabled()?`<td>${r.vegas}</td>`:''}<td class="${totalCls}">${r.total > 0 ? '+' : ''}${r.total}</td><td class="${moneyCls}">${r.money > 0 ? '+' : ''}${r.money} 元</td></tr>`;
      });
      html += `</table>`;
      document.getElementById('final-money').innerHTML = html;
    }

    window.onload = () => {
      initUI();
      applyScoreboardStickyTop();
      window.addEventListener('resize', applyScoreboardStickyTop);
      window.addEventListener('orientationchange', applyScoreboardStickyTop);
    };
  </script>
